<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Qalem</title>
    <!-- Nerd Fonts are loaded via JavaScript (src/lib/fonts.ts) from Tauri resources -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1e1e1e;
      }
    </style>
  </head>

  <body>
    <div id="root">
      <!-- Static safe-mode shell (#173): if the JS bundle fails to evaluate
           (module-scope throw, old-WebKit syntax error), nothing ever mounts
           and the user sees a black window. React's first render replaces
           #root's children, so this block only survives when boot failed.
           It is hidden by default and revealed by the watchdog script below.
           Inline styles only — no external assets, CSP-safe. -->
      <div
        id="boot-fallback"
        style="
          display: none;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          padding: 0 24px;
          box-sizing: border-box;
          text-align: center;
          background: #1e1e1e;
          color: #9ca3af;
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        "
      >
        <p style="margin: 0 0 12px; font-size: 16px; color: #e5e7eb">
          Qalem didn&rsquo;t start correctly.
        </p>
        <p style="margin: 0; max-width: 460px; font-size: 13px; line-height: 1.6">
          Try restarting the app. If this keeps happening, reach out on Slack
          and include your app logs (macOS: ~/Library/Logs/Qalem).
        </p>
      </div>
    </div>
    <script>
      // Safe-mode watchdog: React's first render removes #boot-fallback from
      // the document. If it is still there after 10s, the bundle never
      // mounted — reveal the fallback instead of leaving a black window.
      setTimeout(function () {
        var el = document.getElementById('boot-fallback');
        if (el) el.style.display = 'flex';
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
